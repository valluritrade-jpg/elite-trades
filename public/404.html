<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Elite Trades LLC</title>
    <style>html,body{margin:0;padding:0;background:#020a18;}</style>
    <script>
      // GitHub Pages SPA redirect trick:
      // When GH Pages hits a 404, it serves this file.
      // We encode the full path into the URL and redirect to index.html,
      // which then decodes it and restores the correct location.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
