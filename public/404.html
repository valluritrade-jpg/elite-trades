<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Elite Trades LLC</title>
    <style>html,body{margin:0;padding:0;background:#020a18;}</style>
    <script>
      // GitHub Pages SPA + Supabase auth redirect fix.
      // Supabase sends auth tokens as hash fragments (#access_token=...).
      // We must preserve both the path AND the full hash through the redirect.
      var l = window.location;
      var base = l.pathname.split('/').slice(0, 2).join('/');
      var path = l.pathname.slice(1).split('/').slice(1).join('/');
      var search = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
      // Encode hash separately so Supabase tokens survive
      var hash = l.hash ? '&h=' + encodeURIComponent(l.hash) : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=/' + path.replace(/&/g, '~and~') + search + hash
      );
    </script>
  </head>
  <body></body>
</html>
